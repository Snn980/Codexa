name: Local Production Build (APK)

on:
  workflow_dispatch: # Manuel tetikleme için

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java (Android için gerekli)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install -g eas-cli

      # Keystore dosyasını Base64'ten geri oluşturma
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ./release.jks

      - name: Build Android APK (Local)
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # EAS Local Build sırasında keystore bilgilerini ortam değişkeni olarak veriyoruz
          EAS_PROJECT_CONFIG_V2: >
            {
              "android": {
                "keystore": {
                  "keystorePath": "./release.jks",
                  "keystorePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
                  "keyAlias": "${{ secrets.KEYSTORE_ALIAS }}",
                  "keyPassword": "${{ secrets.KEY_PASSWORD }}"
                }
              }
            }
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-apk
          path: build-*.apk # EAS local build çıktısı genellikle bu formatta olur
          retention-days: 5
